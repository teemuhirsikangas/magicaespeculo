# Automations for go-e charger phase current limiting
# Add to automations.yaml or import via:
# automation: !include_dir_merge_list automations/

# Initialize target amps when car starts charging
- id: goe_init_target_amps
  alias: "go-e: Set desired Target Amp"
  trigger:
    - platform: state
      entity_id: sensor.go_echarger_225812_car
      to: "Charging"
  action:
    - service: input_number.set_value
      target:
        entity_id: input_number.goe_charger_target_amps
      data:
        value: "{{ states('number.go_echarger_225812_amp') | float }}"

# Reduce charging when phase overload detected
- id: goe_reduce_on_overload
  alias: "go-e: Reduce Charging on Overload >25A"
  trigger:
    - platform: state
      entity_id: sensor.phase_overload_status
      to: "overload"
  condition:
    - condition: state
      entity_id: binary_sensor.go_echarger_225812_car
      state: "on"
    - condition: state
      entity_id: sensor.go_echarger_225812_car
      state: "Charging"
    - condition: numeric_state
      entity_id: number.go_echarger_225812_amp
      above: 6
  action:
    - service: number.set_value
      target:
        entity_id: number.go_echarger_225812_amp
      data:
        value: >
          {{ [states('number.go_echarger_225812_amp') | float - 2, 6] | max }}
    - service: notify.persistent_notification
      data:
        title: "⚠️ go-e Charger Limited"
        message: >
          Phase overload detected ({{ states('sensor.max_phase_current') }}A > 25A).
          Reduced charging to {{ [states('number.go_echarger_225812_amp') | float - 2, 6] | max }}A.

# Increase charging when phases are safe
- id: goe_increase_when_safe
  alias: "go-e: Increase Charging When Safe"
  trigger:
    - platform: state
      entity_id: sensor.phase_overload_status
      to: "safe"
      for:
        seconds: 20
  condition:
    - condition: state
      entity_id: binary_sensor.go_echarger_225812_car
      state: "on"
    - condition: state
      entity_id: sensor.go_echarger_225812_car
      state: "Charging"
    - condition: template
      value_template: >
        {{ states('number.go_echarger_225812_amp') | float < 
           states('input_number.goe_charger_target_amps') | float }}
  action:
    - service: number.set_value
      target:
        entity_id: number.go_echarger_225812_amp
      data:
        value: >
          {{ [states('number.go_echarger_225812_amp') | float + 1, 
              states('input_number.goe_charger_target_amps') | float] | min }}

# Monitor every 20 seconds during charging
- id: goe_monitor_phases
  alias: "go-e: Monitor Phase Currents"
  trigger:
    - platform: time_pattern
      seconds: "/20"
  condition:
    - condition: state
      entity_id: binary_sensor.go_echarger_225812_car
      state: "on"
    - condition: state
      entity_id: sensor.go_echarger_225812_car
      state: "Charging"
    - condition: numeric_state
      entity_id: sensor.max_phase_current
      above: 25
    - condition: numeric_state
      entity_id: number.go_echarger_225812_amp
      above: 6
  action:
    - service: number.set_value
      target:
        entity_id: number.go_echarger_225812_amp
      data:
        value: >
          {{ [states('number.go_echarger_225812_amp') | float - 2, 6] | max }}

# Solar surplus charging using native go-e ECO mode (firmware >= 0.55.6)
# The charger handles current adjustment and 1<->3 phase switching automatically.
# pGrid: positive = importing from grid, negative = exporting (surplus available).
# Must be updated every <10s. Phase switch threshold is configured via spl3 entity.
- id: goe_solar_feed_pgrid
  alias: "go-e: Feed pGrid for Solar Surplus Charging"
  trigger:
    - platform: time_pattern
      seconds: "/5"
  condition:
    - condition: state
      entity_id: input_boolean.goe_solar_mode
      state: "on"
    - condition: state
      entity_id: binary_sensor.go_echarger_225812_car
      state: "on"
  action:
    - service: mqtt.publish
      data:
        topic: go-eCharger/225812/ids/set
        retain: false
        payload: >
          {% set import_kw = states('sensor.momentary_active_import') | float(0) %}
          {% set export_kw = states('sensor.momentary_active_export') | float(0) %}
          {% set pgrid = ((import_kw - export_kw) * 1000) | round(0) | int %}
          {% set hour = now().hour %}
          {% if hour >= 10 and hour < 17 %}
          {"pGrid": {{ [pgrid, -1410] | min }}}
          {% else %}
          {"pGrid": {{ pgrid }}}
          {% endif %}

# Enable ECO mode and PV surplus when solar mode toggle is turned on
# use only single phase
- id: goe_solar_mode_on
  alias: "go-e: Enable Solar ECO Mode"
  trigger:
    - platform: state
      entity_id: input_boolean.goe_solar_mode
      to: "on"
  action:
    - service: goecharger_mqtt.set_config_key
      data:
        serial_number: "225812"
        key: lmo
        value: 4
    - service: goecharger_mqtt.set_config_key
      data:
        serial_number: "225812"
        key: psm
        value: 1
    - service: switch.turn_on
      target:
        entity_id: switch.go_echarger_225812_fup

# Disable ECO mode and PV surplus when solar mode toggle is turned off
- id: goe_solar_mode_off
  alias: "go-e: Disable Solar ECO Mode"
  trigger:
    - platform: state
      entity_id: input_boolean.goe_solar_mode
      to: "off"
  action:
    - service: switch.turn_off
      target:
        entity_id: switch.go_echarger_225812_fup
    - service: goecharger_mqtt.set_config_key
      data:
        serial_number: "225812"
        key: lmo
        value: 3
    - service: goecharger_mqtt.set_config_key
      data:
        serial_number: "225812"
        key: psm
        value: 0
    - service: number.set_value
      target:
        entity_id: number.go_echarger_225812_amp
      data:
        value: 10

